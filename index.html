<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沟通辅助工具 - 双界面版</title>
    <style>
        /* 基础与全局样式 */
        :root {
            --bg-color: #F8F5EE;
            --yellow-main: #FCE694;
            --chat-bubble: #EFECDE;
            --text-dark: #333;
            --theme-color: #8ACBB7;
        }

        body {
            margin: 0;
            background-color: #e0e0e0; /* 外围背景稍微深一点，凸显手机框 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 414px;
            background-color: var(--bg-color);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.1); /* 加个阴影更像手机APP */
        }

        /* 控制页面显示的通用类 */
        .page-view {
            display: none; /* 默认隐藏 */
            flex-direction: column;
            height: 100%;
            width: 100%;
        }
        .page-view.active {
            display: flex; /* 激活时显示 */
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ========================================= */
        /* 界面一：配置页 (Config Page) 样式 */
        /* ========================================= */
        .config-header {
            padding: 30px 20px 10px;
            font-size: 24px;
            font-weight: bold;
            color: var(--text-dark);
            text-align: center;
        }
        .config-body {
            padding: 20px;
            flex-grow: 1;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            background: #fff;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }
        .form-group input:focus {
            border-color: var(--theme-color);
        }
        .save-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--theme-color);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .save-btn:active { background-color: #7ab3a1; }

        /* ========================================= */
        /* 界面二：聊天交互页 (Chat Page) 样式 */
        /* ========================================= */
        .header-deco {
            padding: 20px;
            position: relative;
        }
        .user-info { font-weight: bold; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
        .setting-icon { cursor: pointer; font-size: 20px; color: #999; }

        .bubble-msg {
            background-color: var(--chat-bubble);
            padding: 15px;
            border-radius: 20px;
            margin-top: 15px;
            width: fit-content;
            max-width: 70%;
            line-height: 1.5;
            color: #666;
        }
        .character-img {
            display: block;
            width: 150px;
            margin: 20px auto;
        }

        .tags-container {
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex-grow: 1;
            align-content: flex-start;
            overflow-y: auto;
        }

        .tag {
            background-color: #FDF9F0;
            border: 1px solid #E8E4D8;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-dark);
            cursor: pointer;
            animation: fadeIn 0.3s ease;
        }
        .tag:active { background-color: #f1ebd8; }

        .bottom-bar {
            padding: 20px;
            background-color: var(--bg-color);
            border-top: 1px solid #E8E4D8;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .input-box {
            flex-grow: 1;
            background-color: #EEEBDD;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        .plus-btn {
            width: 40px;
            height: 40px;
            background-color: #EEEBDD;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #999;
            font-size: 24px;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="phone-container">

    <div id="configPage" class="page-view">
        <div class="config-header">⚙️ 系统初始化</div>
        <div class="config-body">
            <p style="font-size: 13px; color: #888; margin-bottom: 25px;">首次使用，请先配置大模型参数。配置保存在本地，不会泄露。</p>

            <div class="form-group">
                <label>API 接口地址 (URL)</label>
                <input type="text" id="conf-url" placeholder="例如:https://openrouter.ai/api/v1/chat/completions">
            </div>

            <div class="form-group">
                <label>API 密钥 (Key)</label>
                <input type="password" id="conf-key" placeholder="sk-...">
            </div>

            <div class="form-group">
                <label>模型名称 (Model)</label>
                <input type="text" id="conf-model" placeholder="例如: deepseek/deepseek-chat">
            </div>

            <button class="save-btn" id="saveConfigBtn">保存并进入系统</button>
        </div>
    </div>

    <div id="chatPage" class="page-view">
        <div class="header-deco">
            <div class="user-info">
                <span>Hi ! <br> 小林</span>
                <span class="setting-icon" id="openSettingBtn" title="修改配置">⚙️</span>
            </div>
            <div class="bubble-msg">我们准备好了！随时帮你沟通和记录！</div>
            <svg class="character-img" viewBox="0 0 100 100">
                <polygon points="50,15 90,85 10,85" fill="#FCE694" stroke="#333" stroke-width="2"/>
                <circle cx="40" cy="55" r="3" fill="#333"/>
                <circle cx="60" cy="55" r="3" fill="#333"/>
                <path d="M 45 65 Q 50 72 55 65" fill="none" stroke="#333" stroke-width="2"/>
            </svg>
        </div>

        <div class="tags-container" id="tagsContainer">
            </div>

        <div class="bottom-bar">
            <div class="input-group">
                <input type="text" class="input-box" id="mainInput" placeholder="输入......">
                <div class="plus-btn">+</div>
            </div>
        </div>
    </div>

</div>

<script>
    // ==========================================
    // 页面路由与配置管理逻辑
    // ==========================================
    const configPage = document.getElementById('configPage');
    const chatPage = document.getElementById('chatPage');

    // 从 LocalStorage 加载配置并填充到输入框
    function loadConfig() {
        document.getElementById('conf-url').value = localStorage.getItem('app_llm_url') || "https://openrouter.ai/api/v1/chat/completions";
        document.getElementById('conf-key').value = localStorage.getItem('app_llm_key') || "";
        document.getElementById('conf-model').value = localStorage.getItem('app_llm_model') || "google/gemini-2.5-flash";
    }

    // 检查是否有配置，决定显示哪个页面
    function checkPageRouting() {
        const savedKey = localStorage.getItem('app_llm_key');
        if (savedKey && savedKey.trim() !== "") {
            // 有 Key，直接进入聊天交互页
            configPage.classList.remove('active');
            chatPage.classList.add('active');
        } else {
            // 没 Key，进入配置页
            loadConfig();
            chatPage.classList.remove('active');
            configPage.classList.add('active');
        }
    }

    // 初始化执行路由判断
    checkPageRouting();

    // 保存配置按钮事件
    document.getElementById('saveConfigBtn').addEventListener('click', () => {
        const url = document.getElementById('conf-url').value.trim();
        const key = document.getElementById('conf-key').value.trim();
        const model = document.getElementById('conf-model').value.trim();

        if (!url || !key || !model) {
            alert("请将配置填写完整哦！");
            return;
        }

        // 保存到本地浏览器缓存
        localStorage.setItem('app_llm_url', url);
        localStorage.setItem('app_llm_key', key);
        localStorage.setItem('app_llm_model', model);

        // 切换页面
        checkPageRouting();
    });

    // 聊天页点击右上角齿轮，退回配置页
    document.getElementById('openSettingBtn').addEventListener('click', () => {
        loadConfig(); // 退回时加载最新配置
        chatPage.classList.remove('active');
        configPage.classList.add('active');
    });


    // ==========================================
    // AI 联想交互核心逻辑 (Chat Page 功能)
    // ==========================================
    const SYSTEM_PROMPT = `# 角色设定
你是一位专门为听障人士提供沟通辅助的 AI 助手。你的服务对象是 7 名在“彩虹天使咖啡屋”工作的听障伙伴。
【主场景】：彩虹天使咖啡屋（主营台湾小吃、咖啡和饮品，特色招牌包括凤梨酥、气球面包、红酒面包等）。
【副场景】：听障伙伴的个人日常生活（如外出就餐、购物、问路等简单日常需求）。

# 任务目标
将听障用户输入的碎片化词汇、倒装句或单字，转化为贴近日常口语、礼貌自然、逻辑连贯的表述。优先考虑咖啡屋工作语境，如果包含明显的日常外出等生活词汇，则按日常交流语境转化。

# 处理规则
1. 数量与长度限制：针对用户的每一次输入，**必须严格输出 8 个不同的候选句子**。这 8 个句子必须**长短错落**，包含：
   - 极短句（3-6个字，适合快速回应）
   - 中等句（7-12个字，适合简单交流）
   - 长句（13个字以上，适合详细解释或热情寒暄）
2. 场景优先级：优先判断是否与“咖啡屋运营、点餐、产品”相关并按主场景补全；否则按副场景补全。
3. 去噪与语序：过滤掉明显与语境无关的错别字（如误触词）。将听障人士习惯的宾语前置或颠倒语序调整为健全人习惯的“主谓宾”语序。
4. 表达优化：润色生硬的表达，在合适的位置加入“得”、“啊”、“呢”、“哦”、“呀”等连接词和语气词，但极短句可保持简洁。

# 绝对输出格式（极其重要）
你的最终输出只能是转化后的纯汉字文本列表。
1. **绝对不能包含任何标点符号**（包括句号、逗号、问号、感叹号等）。
2. **绝对不能包含任何空格**。
3. **绝对不能包含任何数字序号或项目符号**（如 1. 2. 3. 或 - 等）。
4. 8 个候选句子之间**仅使用纯粹的换行符（Enter）进行分隔**。

# 示例参考

## 场景一：主场景 - 咖啡屋工作（输入短句/单字发散）
输入：包
输出：
打包带走吗
需要打包吗
帮您打包起来吧
请问是打包还是堂食呢
您的餐点需要打包带走吗
需要拿个袋子帮您装起来吗
请问这个包包是您落在这里的吗
凤梨酥需要帮您打包带回家给家人尝尝吗

输入：红酒面包 招牌 气球 树
（注：“树”为误触的无关词，需过滤）
输出：
尝尝招牌吗
气球面包很好吃
要不要试试红酒面包呀
我们店的招牌是气球面包
红酒面包和气球面包是特色哦
这两款招牌面包店里卖得特别好呢
强烈推荐您尝尝我们的招牌气球面包啊
您好我们店里的特色招牌有气球面包和红酒面包都非常受欢迎您要不要尝尝看呀

输入：打包 还是 在这吃 凤梨酥 两个 你们
输出：
在这吃吗
帮您打包吗
凤梨酥要打包吗
这两个凤梨酥在这吃吗
凤梨酥是堂食还是打包呢
请问这两个凤梨酥怎么给您拿
您好这两个凤梨酥是给您打包还是在这里吃呀
麻烦问一下这俩凤梨酥你们是打算在这里吃还是带走啊

## 场景二：副场景 - 日常生活（输入短句/长句/语序颠倒）
输入：医院 怎么走 远不远 那个
输出：
去医院怎么走
医院离这远吗
请问去医院往哪走
去那家医院要走多久啊
麻烦问一下去那家医院怎么走
您好我想去医院请问离这里远不远
请问知道去那家医院怎么走比较快吗
打扰一下请问去医院应该怎么走啊离这里远不远呢

## 场景三：模糊意图下的场景自动倾斜（优先主场景）
输入：水
输出：
喝点水吗
给您倒杯水吧
需要加点热水吗
小心这杯水有点烫哦
需要给您拿杯白开水吗
您好白开水放在这边了您慢用
请问您是想点些饮品还是只需要一杯温水呢
您先坐一下我这就去给您倒一杯温水过来呀`;

    const input = document.getElementById('mainInput');
    const container = document.getElementById('tagsContainer');
    const defaultWords = ["请再说一次", "抱歉稍微等一下", "打包还是在这喝", "台湾小吃", "谢谢！"];
    let debounceTimer = null;

    renderTags(defaultWords);

    input.addEventListener('input', (e) => {
        const value = e.target.value.trim();
        clearTimeout(debounceTimer);

        if (value === "") {
            container.innerHTML = "";
            renderTags(defaultWords);
            return;
        }

        container.innerHTML = '<div style="color:#999; font-size:14px; width:100%; text-align:center; margin-top: 20px;">✨ AI 正在疯狂联想中...</div>';

        debounceTimer = setTimeout(() => {
            fetchAIPredictions(value);
        }, 600);
    });

    async function fetchAIPredictions(userInput) {
        // 每次请求时，实时从 LocalStorage 读取最新配置
        const url = localStorage.getItem('app_llm_url');
        const key = localStorage.getItem('app_llm_key');
        const model = localStorage.getItem('app_llm_model');

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${key}`
                },
                body: JSON.stringify({
                    model: model,
                    messages: [
                        { role: "system", content: SYSTEM_PROMPT },
                        { role: "user", content: `用户当前输入了：“${userInput}”，请推测补全。` }
                    ],
                    temperature: 0.4
                })
            });

            if (!response.ok) {
                if(response.status === 401) throw new Error("API Key 无效或未授权");
                throw new Error(`HTTP Error: ${response.status}`);
            }

            const data = await response.json();
            const resultText = data.choices[0].message.content.trim();

            let suggestions = [];
            try {
                const cleanJson = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                suggestions = JSON.parse(cleanJson);
                if (!Array.isArray(suggestions)) throw new Error("Not an array");
            } catch (parseError) {
                suggestions = resultText.split(/[\n,，。]/)
                    .map(s => s.replace(/^[0-9.\- ]+/, '').trim())
                    .filter(s => s.length > 0).slice(0, 6);
            }

            container.innerHTML = "";
            if (suggestions.length > 0) {
                renderTags(suggestions);
            } else {
                container.innerHTML = '<div style="color:#999; font-size:14px; width:100%; text-align:center;">暂无匹配联想</div>';
            }

        } catch (error) {
            console.error("AI 联想失败:", error);
            // 给用户友好的错误提示，并建议他们检查配置
            container.innerHTML = `<div style="color:#e74c3c; font-size:13px; width:100%; text-align:center; margin-top: 20px;">
                ⚠️ 联想失败: ${error.message}<br><br>
                <span style="color:#999; text-decoration:underline; cursor:pointer;" onclick="document.getElementById('openSettingBtn').click()">点击右上角 ⚙️ 检查网络或密钥配置</span>
            </div>`;
        }
    }

    function renderTags(list) {
        list.forEach(text => {
            const div = document.createElement('div');
            div.className = 'tag';
            div.innerText = text;
            div.onclick = () => {
                input.value = text;
                input.focus();
            };
            container.appendChild(div);
        });
    }
</script>

</body>
</html>
