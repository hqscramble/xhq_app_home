<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沟通辅助工具 - AI 驱动版</title>
    <style>
        /* 还原 UI 配色与风格 */
        :root {
            --bg-color: #F8F5EE;
            --yellow-main: #FCE694;
            --chat-bubble: #EFECDE;
            --text-dark: #333;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 414px;
            background-color: var(--bg-color);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部装饰图 */
        .header-deco {
            padding: 20px;
            position: relative;
        }
        .user-info { font-weight: bold; font-size: 18px; }
        .bubble-msg {
            background-color: var(--chat-bubble);
            padding: 15px;
            border-radius: 20px;
            margin-top: 15px;
            width: fit-content;
            max-width: 70%;
            line-height: 1.5;
            color: #666;
        }
        .character-img {
            display: block;
            width: 150px;
            margin: 20px auto;
        }

        /* 联想词展示区 */
        .tags-container {
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex-grow: 1;
            align-content: flex-start;
            overflow-y: auto;
        }

        .tag {
            background-color: #FDF9F0;
            border: 1px solid #E8E4D8;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-dark);
            cursor: pointer;
            animation: fadeIn 0.3s ease;
        }

        .tag:hover {
            background-color: #f1ebd8;
        }

        /* 底部输入区域 */
        .bottom-bar {
            padding: 20px;
            background-color: var(--bg-color);
            border-top: 1px solid #E8E4D8;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-box {
            flex-grow: 1;
            background-color: #EEEBDD;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }

        .plus-btn {
            width: 40px;
            height: 40px;
            background-color: #EEEBDD;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #999;
            font-size: 24px;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header-deco">
        <div class="user-info">Hi ! <br> 小林</div>
        <div class="bubble-msg">我们准备好了！随时帮你沟通和记录！</div>
        <svg class="character-img" viewBox="0 0 100 100">
            <polygon points="50,15 90,85 10,85" fill="#FCE694" stroke="#333" stroke-width="2"/>
            <circle cx="40" cy="55" r="3" fill="#333"/>
            <circle cx="60" cy="55" r="3" fill="#333"/>
            <path d="M 45 65 Q 50 72 55 65" fill="none" stroke="#333" stroke-width="2"/>
        </svg>
    </div>

    <div class="tags-container" id="tagsContainer">
        </div>

    <div class="bottom-bar">
        <div class="input-group">
            <input type="text" class="input-box" id="mainInput" placeholder="输入......">
            <div class="plus-btn">+</div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 🤖 大模型 API 配置区 (直接在此修改即可生效)
    // ==========================================
    const LLM_URL = "https://openrouter.ai/api/v1/chat/completions";
    const LLM_KEY = "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"; // 填入你的 API Key
    const LLM_MODEL = "deepseek/deepseek-chat"; // 建议使用极速模型，如 haiku 或 flash

    const SYSTEM_PROMPT = `你是一个专门为听障人士设计的沟通输入预测助手。
当用户输入半个句子、一两个字或者首字母时，请你预测他们接下来最有可能想表达的 4 到 6 个完整短句。
要求：
1. 必须符合日常真实口语习惯。
2. 句子要简短、直接、礼貌、生活化。
3. 绝对不要包含任何多余的解释、标点或 markdown 语法。
4. 严格并只输出一个 JSON 数组格式，例如：["请等一下", "等我确认一下", "等多久", "等朋友"]`;

    // ==========================================
    // UI 控制逻辑
    // ==========================================
    const input = document.getElementById('mainInput');
    const container = document.getElementById('tagsContainer');
    const defaultWords = ["请再说一次", "抱歉稍微等一下", "打包还是在这喝", "台湾小吃", "谢谢！"];
    let debounceTimer = null;

    // 页面加载时渲染默认词汇
    renderTags(defaultWords);

    // 监听用户输入
    input.addEventListener('input', (e) => {
        const value = e.target.value.trim();

        // 每次输入变化，清除上一个正在计时的定时器
        clearTimeout(debounceTimer);

        if (value === "") {
            container.innerHTML = "";
            renderTags(defaultWords);
            return;
        }

        // 提示用户正在思考，提升体验
        container.innerHTML = '<div style="color:#999; font-size:14px; width:100%; text-align:center; margin-top: 20px;">✨ AI 正在疯狂联想中...</div>';

        // 启动防抖定时器：用户停止输入 600 毫秒后，再发起网络请求
        debounceTimer = setTimeout(() => {
            fetchAIPredictions(value);
        }, 600);
    });

    // 请求大模型获取预测词汇
    async function fetchAIPredictions(userInput) {
        try {
            const response = await fetch(LLM_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${LLM_KEY}`
                },
                body: JSON.stringify({
                    model: LLM_MODEL,
                    messages: [
                        { role: "system", content: SYSTEM_PROMPT },
                        { role: "user", content: `用户当前输入了：“${userInput}”，请推测补全。` }
                    ],
                    temperature: 0.4 // 偏向稳定的预测
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP Error: ${response.status}`);
            }

            const data = await response.json();
            const resultText = data.choices[0].message.content.trim();

            let suggestions = [];

            // 尝试解析模型返回的 JSON 数组
            try {
                // 剔除可能包含的 markdown json 包裹符号
                const cleanJson = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                suggestions = JSON.parse(cleanJson);

                // 确保解析出来的是个数组
                if (!Array.isArray(suggestions)) throw new Error("Not an array");

            } catch (parseError) {
                // 兜底方案：如果大模型没听话，返回了纯文本，我们就按换行符或逗号手工切割
                console.warn("AI 没有返回标准 JSON，启用备用解析方案");
                suggestions = resultText.split(/[\n,，。]/)
                    .map(s => s.replace(/^[0-9.\- ]+/, '').trim()) // 移除可能的序号 (1. 2. 等)
                    .filter(s => s.length > 0)
                    .slice(0, 6);
            }

            container.innerHTML = ""; // 清空加载状态

            if (suggestions.length > 0) {
                renderTags(suggestions);
            } else {
                container.innerHTML = '<div style="color:#999; font-size:14px; width:100%; text-align:center;">暂无匹配联想</div>';
            }

        } catch (error) {
            console.error("AI 联想失败:", error);
            container.innerHTML = '<div style="color:#e74c3c; font-size:14px; width:100%; text-align:center; margin-top: 20px;">⚠️ 网络走神了，没联想出来</div>';
        }
    }

    // 渲染标签的函数
    function renderTags(list) {
        list.forEach(text => {
            const div = document.createElement('div');
            div.className = 'tag';
            div.innerText = text;

            // 点击标签直接补全输入框的内容
            div.onclick = () => {
                input.value = text;
                input.focus();

                // 可选：选中后立刻触发下一次联想，让句子越拼越长
                // input.dispatchEvent(new Event('input'));
            };
            container.appendChild(div);
        });
    }
</script>

</body>
</html>
